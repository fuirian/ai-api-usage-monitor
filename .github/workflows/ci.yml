# CI aligned with docs/architecture.md §8.2 (secret scanning), §10 (Compose).
# Branch triggers: docs/branch-conventions.md (main, develop, PR targets).

name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      identity: ${{ steps.filter.outputs.identity }}
      proxy: ${{ steps.filter.outputs.proxy }}
      workflows: ${{ steps.filter.outputs.workflows }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            identity:
              - 'services/identity-service/**'
            proxy:
              - 'services/proxy-gateway-service/**'
              - 'libs/usage-events/**'
            workflows:
              - '.github/workflows/**'

  gitleaks:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  compose-validate:
    name: Validate docker-compose.yml
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker compose -f docker-compose.yml config

  identity-service:
    name: Build identity-service
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.identity == 'true' || needs.changes.outputs.workflows == 'true'
    defaults:
      run:
        working-directory: services/identity-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle
          cache-dependency-path: services/identity-service/build.gradle
      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew
      - name: Build and test
        run: ./gradlew build --no-daemon

  proxy-gateway-service:
    name: Build proxy-gateway-service
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.proxy == 'true' || needs.changes.outputs.workflows == 'true'
    defaults:
      run:
        working-directory: services/proxy-gateway-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle
          cache-dependency-path: services/proxy-gateway-service/build.gradle
      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew
      - name: Build and test
        run: ./gradlew build --no-daemon

  # Single required check for branch protection (docs/branch-conventions.md §4).
  # Skipped Java/Compose jobs (path filter) do not fail the workflow.
  ci-summary:
    name: CI summary
    runs-on: ubuntu-latest
    needs:
      - changes
      - gitleaks
      - compose-validate
      - identity-service
      - proxy-gateway-service
    if: always()
    steps:
      - name: Assert required jobs
        run: |
          if [[ "${{ needs.changes.result }}" != "success" ]]; then
            echo "changes job did not succeed: ${{ needs.changes.result }}"
            exit 1
          fi
          if [[ "${{ needs.gitleaks.result }}" != "success" ]]; then
            echo "gitleaks did not succeed: ${{ needs.gitleaks.result }}"
            exit 1
          fi
          if [[ "${{ needs.compose-validate.result }}" != "success" ]]; then
            echo "compose-validate did not succeed: ${{ needs.compose-validate.result }}"
            exit 1
          fi
          for name in identity-service proxy-gateway-service; do
            case "$name" in
              identity-service) v="${{ needs.identity-service.result }}" ;;
              proxy-gateway-service) v="${{ needs.proxy-gateway-service.result }}" ;;
            esac
            if [[ "$v" == "failure" || "$v" == "cancelled" ]]; then
              echo "$name ended with $v"
              exit 1
            fi
          done
          echo "All required checks passed or were skipped appropriately."
