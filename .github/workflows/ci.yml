# ai-api-usage-monitor — Gradle 빌드(CI) 및 Docker Hub 푸시(CD, main 브랜치)
#
# 필수 시크릿 (Docker 푸시 시): DOCKERHUB_USERNAME, DOCKERHUB_TOKEN
#
# Gradle 래퍼는 현재 identity-service 모듈에만 있습니다.
# 루트에서 멀티 모듈로 확장 시 settings.gradle + 루트 gradlew 추가 후
# working-directory / build-root-directory 만 조정하면 됩니다.

name: CI

on:
  push:
    branches: ['**']
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GRADLE_MODULE_DIR: identity-service

jobs:
  gradle-build:
    name: Gradle build (all modules)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.GRADLE_MODULE_DIR }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          build-root-directory: ${{ env.GRADLE_MODULE_DIR }}

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew build --no-daemon

      - name: Upload boot JAR (for Docker on main)
        if: >
          github.event_name == 'push' &&
          (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        uses: actions/upload-artifact@v4
        with:
          name: boot-jar
          path: ${{ env.GRADLE_MODULE_DIR }}/build/libs/app.jar
          if-no-files-found: error

  docker-publish:
    name: Build & push Docker image
    needs: gradle-build
    if: >
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download boot JAR
        uses: actions/download-artifact@v4
        with:
          name: boot-jar
          path: ${{ env.GRADLE_MODULE_DIR }}/build/libs

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.GRADLE_MODULE_DIR }}
          file: ${{ env.GRADLE_MODULE_DIR }}/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/identity-service:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/identity-service:${{ github.sha }}
